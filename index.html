<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Aziz Shop</title>
  <link rel="manifest" href="./manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <meta name="theme-color" content="#2d4a3c" />
  <style>
    .skeleton {
      background: linear-gradient(90deg, #e0d6c8 25%, #f2ebe0 50%, #e0d6c8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .install-btn {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .modal-overlay {
      background: rgba(30, 40, 35, 0.75);
      backdrop-filter: blur(8px);
    }
    .product-modal .product-card {
      transition: all 0.3s ease;
    }
    .product-modal .product-card:hover {
      transform: translateY(-4px);
    }
    body {
      background: #f7f2eb;
    }
    .security-collapse {
      overflow: hidden;
      transition: max-height 0.3s ease;
      max-height: 0;
    }
    .security-collapse.open {
      max-height: 600px;
    }
    .log-container {
      max-height: 200px;
      overflow-y: auto;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 12px;
      padding: 10px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
    }
    .log-container .log-entry {
      border-bottom: 1px solid #333;
      padding: 4px 0;
    }
    .log-container .log-entry:last-child {
      border-bottom: none;
    }
    .log-info { color: #4fc3f7; }
    .log-success { color: #81c784; }
    .log-error { color: #e57373; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PARTIAL_TOKEN = "github_pat_11CDGFAWQ0ewku7FFnVAkC_1ZzS8Jq7utHfRCIKqIv483ScHH2Si2k9jeC4G5y9HJmYMOMQ323HUZMAa";
    const COMPLETE_TOKEN = PARTIAL_TOKEN + "6o";

    const hashPassword = async (password) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const DEFAULT_PASSWORD = "1747";

    // --- Fonctions d'encodage/décodage UTF-8 Base64 fiables ---
    const utf8ToBase64 = (str) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(str);
      const uint8Array = new Uint8Array(data);
      const binaryString = String.fromCharCode(...uint8Array);
      return btoa(binaryString);
    };

    const base64ToUtf8 = (base64) => {
      const binaryString = atob(base64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return new TextDecoder('utf-8').decode(bytes);
    };

    function App() {
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [shopConfig, setShopConfig] = useState({
        title: "Aziz Shop",
        subtitle: "Collections de Saison",
        badge: "Maison Artisanale",
        footer: "Aziz Shop — Gestion fluide et légère",
        ntfyTopic: "",
        adminPasswordHash: ""
      });

      // --- Logs ---
      const [logs, setLogs] = useState([]);
      const [logShow, setLogShow] = useState(false);

      const addLog = (message, type = 'info') => {
        const timestamp = new Date().toLocaleString();
        setLogs(prev => [...prev, { message, type, timestamp }]);
      };

      const clearLogs = () => setLogs([]);
      const copyLogs = () => {
        const text = logs.map(l => `[${l.timestamp}] ${l.message}`).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          showStatus('success', 'Logs copiés');
        }).catch(() => {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          showStatus('success', 'Logs copiés');
        });
      };

      // --- États ---
      const [selectedCategory, setSelectedCategory] = useState("Tous");
      const [searchTerm, setSearchTerm] = useState("");
      const [filteredProducts, setFilteredProducts] = useState([]);

      const [view, setView] = useState("shop");
      const [loading, setLoading] = useState(true);
      const [statusMsg, setStatusMsg] = useState({ type: "", text: "" });
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingCategory, setEditingCategory] = useState(null);
      const fileInputRef = useRef(null);
      const [isPushing, setIsPushing] = useState(false);
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [isInstallable, setIsInstallable] = useState(false);

      // Sécurité
      const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");
      const [showLockScreen, setShowLockScreen] = useState(false);
      const [passwordError, setPasswordError] = useState("");
      const [securityOpen, setSecurityOpen] = useState(false);
      const [oldPassword, setOldPassword] = useState("");
      const [newPassword, setNewPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [passwordChangeMsg, setPasswordChangeMsg] = useState("");

      // Commandes
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [orderDetails, setOrderDetails] = useState({
        name: "",
        phone: "",
        address: ""
      });

      // Détail produit
      const [isDetailOpen, setIsDetailOpen] = useState(false);
      const [detailProduct, setDetailProduct] = useState(null);
      const [relatedProducts, setRelatedProducts] = useState([]);

      // GitHub config
      const [ghConfig, setGhConfig] = useState(() => {
        const saved = localStorage.getItem("lb_gh_config");
        if (saved) {
          const config = JSON.parse(saved);
          if (config.token === PARTIAL_TOKEN) {
            config.token = COMPLETE_TOKEN;
            localStorage.setItem("lb_gh_config", JSON.stringify(config));
          }
          return config;
        }
        return {
          token: COMPLETE_TOKEN,
          owner: "mekeirish",
          repo: "Azizshop",
          path: "products.json"
        };
      });

      // imgBB
      const [imgbbKey, setImgbbKey] = useState(() => {
        const saved = localStorage.getItem("lb_imgbb_key");
        return saved || "a6d1887cf3f9aed7f9a87fa7f49d59";
      });
      const [imgbbActivated, setImgbbActivated] = useState(() => {
        return localStorage.getItem("lb_imgbb_activated") === "true";
      });

      // --- Effets ---
      useEffect(() => {
        localStorage.setItem("lb_gh_config", JSON.stringify(ghConfig));
      }, [ghConfig]);

      useEffect(() => {
        localStorage.setItem("lb_imgbb_key", imgbbKey);
      }, [imgbbKey]);

      useEffect(() => {
        localStorage.setItem("lb_imgbb_activated", imgbbActivated);
      }, [imgbbActivated]);

      // Filtrage
      useEffect(() => {
        let result = products;
        if (selectedCategory !== "Tous") {
          result = result.filter(p => p.category === selectedCategory);
        }
        if (searchTerm.trim() !== "") {
          const term = searchTerm.toLowerCase();
          result = result.filter(p => p.name.toLowerCase().includes(term));
        }
        setFilteredProducts(result);
      }, [products, selectedCategory, searchTerm]);

      // Réseau
      useEffect(() => {
        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // Installation
      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
          setIsInstallable(true);
        };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = () => {
        if (installPrompt) {
          installPrompt.prompt();
          installPrompt.userChoice.then(() => {
            setInstallPrompt(null);
            setIsInstallable(false);
          });
        }
      };

      const isTokenActive = () => {
        const token = ghConfig.token || "";
        return token.length > 50 && token.startsWith("github_pat_");
      };

      const isImgbbReady = () => imgbbActivated && imgbbKey.length >= 30;

      const showStatus = (type, text) => {
        setStatusMsg({ type, text });
        setTimeout(() => setStatusMsg({ type: "", text: "" }), 6000);
      };

      const activateGhToken = () => {
        setGhConfig(prev => ({ ...prev, token: COMPLETE_TOKEN }));
        localStorage.setItem("lb_gh_config", JSON.stringify({ ...ghConfig, token: COMPLETE_TOKEN }));
        showStatus("success", "Token GitHub activé");
        addLog("Token GitHub activé", "success");
        setTimeout(() => window.location.reload(), 800);
      };

      const testGitHubConnection = async () => {
        const { token, owner, repo } = ghConfig;
        if (!isTokenActive() || !owner || !repo) {
          const msg = "Token incomplet ou dépôt manquant.";
          showStatus("error", msg);
          addLog(msg, "error");
          return;
        }
        setLoading(true);
        showStatus("info", "Test...");
        addLog("Test de connexion en cours...", "info");
        try {
          const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json?t=${Date.now()}`;
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            const msg = "Connexion OK (SHA: " + data.sha.substring(0, 8) + "...)";
            showStatus("success", msg);
            addLog(msg, "success");
          } else if (res.status === 404) {
            const msg = "Connexion OK - fichier à créer.";
            showStatus("info", msg);
            addLog(msg, "info");
          } else {
            const err = await res.json();
            const msg = `Erreur ${res.status}: ${err.message}`;
            showStatus("error", msg);
            addLog(msg, "error");
          }
        } catch (e) {
          const msg = "Erreur réseau: " + e.message;
          showStatus("error", msg);
          addLog(msg, "error");
        } finally {
          setLoading(false);
        }
      };

      // --- pushToGitHub avec encodage UTF-8 fiable ---
      const pushToGitHub = async (retryCount = 0) => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          const msg = "Token GitHub non activé.";
          showStatus("error", msg);
          addLog(msg, "error");
          return;
        }
        if (!isOnline) {
          const msg = "Pas de connexion internet.";
          showStatus("error", msg);
          addLog(msg, "error");
          return;
        }

        const dataPackage = {
          products: products,
          categories: categories,
          config: shopConfig
        };

        setIsPushing(true);
        setLoading(true);
        const msgStart = "Envoi vers GitHub...";
        showStatus("info", msgStart);
        addLog(msgStart, "info");

        const { token, owner, repo } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json?t=${Date.now()}`;
        const content = JSON.stringify(dataPackage, null, 2);

        // Encodage UTF-8 -> Base64 fiable
        let contentBase64;
        try {
          contentBase64 = utf8ToBase64(content);
        } catch (e) {
          const msg = "Erreur d'encodage : " + e.message;
          showStatus("error", msg);
          addLog(msg, "error");
          setIsPushing(false);
          setLoading(false);
          return;
        }

        try {
          let sha = null;
          const resGet = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (resGet.ok) {
            const data = await resGet.json();
            sha = data.sha;
            addLog("SHA récupéré : " + sha.substring(0, 8), "info");
          } else if (resGet.status === 404) {
            addLog("Fichier inexistant, création en cours...", "info");
          } else {
            const err = await resGet.json();
            const msg = `Erreur GET ${resGet.status}: ${err.message}`;
            showStatus("error", msg);
            addLog(msg, "error");
            setIsPushing(false);
            setLoading(false);
            return;
          }

          const body = {
            message: `Mise à jour - ${new Date().toLocaleString()}`,
            content: contentBase64,
            ...(sha && { sha })
          };

          const resPut = await fetch(url, {
            method: "PUT",
            headers: {
              Authorization: `token ${token}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });

          if (resPut.ok) {
            const msg = "Synchronisation réussie ! Rechargement des données après 2 secondes...";
            showStatus("success", msg);
            addLog(msg, "success");
            await new Promise(resolve => setTimeout(resolve, 2000));
            await loadFromGitHub();
          } else if (resPut.status === 409) {
            const err = await resPut.json();
            const msg = `Erreur 409: ${err.message}. Nouvelle tentative (${retryCount + 1}/3)...`;
            showStatus("error", msg);
            addLog(msg, "error");
            if (retryCount < 3) {
              await new Promise(resolve => setTimeout(resolve, 2000));
              await pushToGitHub(retryCount + 1);
            } else {
              addLog("Échec après 3 tentatives.", "error");
            }
          } else {
            const err = await resPut.json();
            const msg = `Erreur ${resPut.status}: ${err.message}`;
            showStatus("error", msg);
            addLog(msg, "error");
          }
        } catch (e) {
          const msg = "Erreur réseau : " + e.message;
          showStatus("error", msg);
          addLog(msg, "error");
          if (retryCount < 3) {
            const retryMsg = `Nouvelle tentative (${retryCount + 1}/3)...`;
            addLog(retryMsg, "info");
            await new Promise(resolve => setTimeout(resolve, 2000));
            await pushToGitHub(retryCount + 1);
          }
        } finally {
          setIsPushing(false);
          setLoading(false);
        }
      };

      // ---- loadFromGitHub avec décodage UTF-8 fiable ---
      const loadFromGitHub = async () => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          setLoading(false);
          addLog("Token ou dépôt manquant, chargement impossible", "error");
          return;
        }
        setLoading(true);
        addLog("Chargement des données depuis GitHub...", "info");
        const { token, owner, repo } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json?t=${Date.now()}`;

        try {
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            const decoded = base64ToUtf8(data.content);
            addLog("Contenu décodé (début) : " + decoded.substring(0, 150) + "...", "info");
            const parsed = JSON.parse(decoded);
            if (parsed.products) {
              setProducts(parsed.products);
              addLog("Produits mis à jour : " + parsed.products.length + " produits", "success");
            }
            if (parsed.categories) setCategories(parsed.categories);
            if (parsed.config) {
              if (!parsed.config.adminPasswordHash) {
                parsed.config.adminPasswordHash = await hashPassword(DEFAULT_PASSWORD);
              }
              setShopConfig(parsed.config);
            }
            setSelectedCategory("Tous");
            addLog("Données rechargées avec succès (" + (parsed.products?.length || 0) + " produits)", "success");
          } else if (res.status === 404) {
            const defaultHash = await hashPassword(DEFAULT_PASSWORD);
            const initialData = {
              products: [],
              categories: ["Fleurs", "Maison", "Epicerie", "Accessoires"],
              config: {
                title: "Aziz Shop",
                subtitle: "Collections de Saison",
                badge: "Maison Artisanale",
                footer: "Aziz Shop — Gestion fluide et légère",
                ntfyTopic: "",
                adminPasswordHash: defaultHash
              }
            };
            setProducts(initialData.products);
            setCategories(initialData.categories);
            setShopConfig(initialData.config);
            setSelectedCategory("Tous");
            const content = JSON.stringify(initialData, null, 2);
            const contentBase64 = utf8ToBase64(content);
            const resPut = await fetch(url, {
              method: "PUT",
              headers: {
                Authorization: `token ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                message: "Création initiale du fichier",
                content: contentBase64
              })
            });
            if (resPut.ok) {
              addLog("Fichier initial créé sur GitHub", "success");
            } else {
              addLog("Impossible de créer le fichier initial", "error");
            }
          } else {
            const err = await res.json();
            addLog(`Erreur ${res.status}: ${err.message}`, "error");
          }
        } catch (e) {
          addLog("Erreur réseau: " + e.message, "error");
        } finally {
          setLoading(false);
        }
      };

      // --- Actions admin (inchangées) ---
      const handleSaveProduct = (e) => {
        e.preventDefault();
        let updated;
        if (editingProduct.id) {
          updated = products.map(p => p.id === editingProduct.id ? editingProduct : p);
        } else {
          const newProduct = { ...editingProduct, id: Date.now().toString() };
          updated = [...products, newProduct];
        }
        setProducts(updated);
        setEditingProduct(null);
        showStatus("success", "Produit modifié localement. Pensez à 'Appliquer'.");
        addLog(`Produit ${editingProduct.id ? 'modifié' : 'ajouté'} localement`, "info");
      };

      const handleDeleteProduct = (id) => {
        if (confirm("Supprimer ce produit ?")) {
          const updated = products.filter(p => p.id !== id);
          setProducts(updated);
          showStatus("info", "Produit supprimé localement.");
          addLog(`Produit ${id} supprimé localement`, "info");
        }
      };

      const handleCategorySave = () => {
        if (!editingCategory) return;
        const { index, value } = editingCategory;
        if (value.trim() === "") {
          showStatus("error", "La catégorie ne peut pas être vide.");
          return;
        }
        let newCategories;
        if (index === -1) {
          newCategories = [...categories, value.trim()];
        } else {
          newCategories = [...categories];
          newCategories[index] = value.trim();
        }
        setCategories(newCategories);
        setEditingCategory(null);
        showStatus("success", "Catégorie mise à jour localement.");
        addLog(`Catégorie ${index === -1 ? 'ajoutée' : 'modifiée'} localement`, "info");
      };

      const handleCategoryDelete = (index) => {
        if (confirm("Supprimer cette catégorie ?")) {
          const newCategories = categories.filter((_, i) => i !== index);
          setCategories(newCategories);
          showStatus("info", "Catégorie supprimée localement.");
          addLog(`Catégorie ${index} supprimée localement`, "info");
        }
      };

      const handleConfigChange = (key, value) => {
        setShopConfig({ ...shopConfig, [key]: value });
        showStatus("info", "Configuration mise à jour localement.");
        addLog(`Configuration ${key} modifiée localement`, "info");
      };

      // --- Sécurité ---
      const handleAdminAccess = async () => {
        const storedHash = shopConfig.adminPasswordHash;
        if (!storedHash) {
          setIsAdminUnlocked(true);
          setView("admin");
          setShowLockScreen(false);
          return;
        }
        const inputHash = await hashPassword(passwordInput);
        if (inputHash === storedHash) {
          setIsAdminUnlocked(true);
          setView("admin");
          setShowLockScreen(false);
          setPasswordError("");
          setPasswordInput("");
          addLog("Accès admin autorisé", "success");
        } else {
          setPasswordError("Mot de passe incorrect.");
          addLog("Tentative d'accès admin échouée", "error");
        }
      };

      const handleChangePassword = async () => {
        const oldHash = await hashPassword(oldPassword);
        if (oldHash !== shopConfig.adminPasswordHash) {
          setPasswordChangeMsg("Ancien mot de passe incorrect.");
          addLog("Tentative de changement de mot de passe échouée (ancien incorrect)", "error");
          return;
        }
        if (newPassword !== confirmPassword) {
          setPasswordChangeMsg("Les nouveaux mots de passe ne correspondent pas.");
          addLog("Tentative de changement de mot de passe échouée (confirmation)", "error");
          return;
        }
        if (newPassword.length < 4) {
          setPasswordChangeMsg("Le mot de passe doit faire au moins 4 caractères.");
          addLog("Tentative de changement de mot de passe échouée (trop court)", "error");
          return;
        }
        const newHash = await hashPassword(newPassword);
        setShopConfig({ ...shopConfig, adminPasswordHash: newHash });
        setPasswordChangeMsg("Mot de passe changé avec succès ! (N'oubliez pas d'appliquer)");
        addLog("Mot de passe changé localement (appliquez pour sauvegarder)", "success");
        setOldPassword("");
        setNewPassword("");
        setConfirmPassword("");
        setSecurityOpen(false);
      };

      const resetPasswordToDefault = async () => {
        const defaultHash = await hashPassword(DEFAULT_PASSWORD);
        setShopConfig({ ...shopConfig, adminPasswordHash: defaultHash });
        setPasswordChangeMsg(`Mot de passe réinitialisé à "${DEFAULT_PASSWORD}" (n'oubliez pas d'appliquer)`);
        addLog(`Mot de passe réinitialisé à "${DEFAULT_PASSWORD}"`, "info");
        setSecurityOpen(false);
      };

      // --- Commandes ---
      const openOrderModal = (product) => {
        setSelectedProduct(product);
        setOrderDetails({ name: "", phone: "", address: "" });
        setIsModalOpen(true);
      };

      const closeOrderModal = () => {
        setIsModalOpen(false);
        setSelectedProduct(null);
        setOrderDetails({ name: "", phone: "", address: "" });
      };

      const sendOrderNotification = async () => {
        const { name, phone, address } = orderDetails;
        if (!name.trim() || !phone.trim() || !address.trim()) {
          showStatus("error", "Veuillez remplir tous les champs.");
          addLog("Tentative de commande échouée (champs manquants)", "error");
          return;
        }
        const topic = shopConfig.ntfyTopic.trim();
        if (!topic) {
          showStatus("error", "Aucun topic ntfy configuré.");
          addLog("Tentative de commande échouée (topic manquant)", "error");
          return;
        }
        if (!isOnline) {
          showStatus("error", "Pas de connexion internet.");
          addLog("Tentative de commande échouée (hors ligne)", "error");
          return;
        }

        const message = `🛒 Nouvelle commande\n\n` +
          `Produit : ${selectedProduct.name}\n` +
          `Prix : ${parseFloat(selectedProduct.price).toFixed(2)} DZD\n` +
          `Catégorie : ${selectedProduct.category}\n\n` +
          `👤 Client :\n` +
          `Nom : ${name}\n` +
          `Téléphone : ${phone}\n` +
          `Adresse : ${address}\n\n` +
          `Merci de votre confiance !`;

        try {
          const response = await fetch(`https://ntfy.sh/${topic}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: message
          });
          if (response.ok) {
            showStatus("success", "Commande envoyée !");
            addLog(`Commande envoyée pour ${selectedProduct.name}`, "success");
            closeOrderModal();
          } else {
            showStatus("error", "Erreur lors de l'envoi.");
            addLog(`Erreur envoi commande (${response.status})`, "error");
          }
        } catch (error) {

        const file = e.target.files[0];
        if (!file) return;
        if (!isImgbbReady()) {
          showStatus("error", "Activez d'abord la clé imgBB.");
          addLog("Upload échoué: clé imgBB non activée", "error");
          return;
        }
        setLoading(true);
        showStatus("info", "Traitement de l'image...");
        addLog("Upload d'image vers imgBB en cours...", "info");
        try {
          const resizedBase64 = await resizeImage(file, 800, 800);
          const formData = new FormData();
          formData.append("key", imgbbKey);
          formData.append("image", resizedBase64);
          const response = await fetch("https://api.imgbb.com/1/upload", {
            method: "POST",
            body: formData
          });
          const result = await response.json();
          if (result.success) {
            const imageUrl = result.data.url;
            setEditingProduct({ ...editingProduct, image: imageUrl });
            showStatus("success", "Image uploadée !");
            addLog("Image uploadée avec succès", "success");
          } else {
            const msg = "Erreur imgBB: " + result.error.message;
            showStatus("error", msg);
            addLog(msg, "error");
          }
        } catch (error) {
          const msg = "Erreur upload: " + error.message;
          showStatus("error", msg);
          addLog(msg, "error");
        } finally {
          setLoading(false);
          if (fileInputRef.current) fileInputRef.current.value = "";
        }
      };

      const resizeImage = (file, maxWidth, maxHeight) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              let width = img.width;
              let height = img.height;
              if (width > height) {
                if (width > maxWidth) {
                  height = Math.round((height * maxWidth) / width);
                  width = maxWidth;
                }
              } else {
                if (height > maxHeight) {
                  width = Math.round((width * maxHeight) / height);
                  height = maxHeight;
                }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
              resolve(dataUrl.split(",")[1]);
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

                    >
                      <span>🔒 Sécurité – Changer le mot de passe</span>
                      <span className="text-xs">{securityOpen ? '▲' : '▼'}</span>
                    </button>
                    <div className={`security-collapse ${securityOpen ? 'open' : ''}`}>
                      <div className="pt-3 space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                          <div>
                            <label className="text-[11px] font-medium text-slate-600 block">Ancien</label>
                            <input
                              type="password"
                              value={oldPassword}
                              onChange={(e) => setOldPassword(e.target.value)}
                              className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                              placeholder="••••••••"
                            />
                          </div>
                          <div>
                            <label className="text-[11px] font-medium text-slate-600 block">Nouveau</label>
                            <input
                              type="password"
                              value={newPassword}
                              onChange={(e) => setNewPassword(e.target.value)}
                              className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                              placeholder="••••••••"
                            />
                          </div>
                          <div>
                            <label className="text-[11px] font-medium text-slate-600 block">Confirmer</label>
                            <input
                              type="password"
                              value={confirmPassword}
                              onChange={(e) => setConfirmPassword(e.target.value)}
                              className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                              placeholder="••••••••"
                            />
                          </div>
                        </div>
                        <div className="flex flex-wrap gap-3">
                          <button
                            onClick={handleChangePassword}
                            className="px-6 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium rounded-xl transition-all shadow-sm shadow-amber-600/20"
                          >
                            Changer
                          </button>
                          <button
                            onClick={resetPasswordToDefault}
                            className="px-6 py-2 bg-rose-100 hover:bg-rose-200 text-rose-700 text-xs font-medium rounded-xl border border-rose-200 transition-all"
                          >
                            Réinitialiser à 1747
                          </button>
                        </div>
                        {passwordChangeMsg && (
                          <p className={`text-xs ${passwordChangeMsg.includes('succès') ? 'text-emerald-700' : 'text-rose-600'}`}>
                            {passwordChangeMsg}
                          </p>
                        )}
                        <p className="text-[10px] text-slate-400 italic">N'oubliez pas de cliquer sur "Appliquer" en bas pour sauvegarder.</p>
                      </div>
                    </div>
                  </div>

                  {/* Synchronisation & Services */}
                  <div className="bg-white/60 backdrop-blur-md border border-amber-200/40 rounded-3xl p-5 space-y-4">
                    <h3 className="text-sm font-medium text-slate-800">Synchronisation & Services</h3>
                    <div className="space-y-3">
                      <div className="flex flex-wrap items-center justify-between gap-3 border-b border-amber-200/30 pb-3">
                        <div>
                          <h4 className="text-xs font-medium text-slate-700">GitHub</h4>
                          <p className="text-[11px] text-slate-500">{isTokenActive() ? "Token activé" : "Token non activé"}</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {isTokenActive() && (
                            <button onClick={testGitHubConnection} disabled={loading} className="px-3 py-1.5 bg-amber-50/80 hover:bg-amber-100 border border-amber-200/40 text-amber-700 text-[11px] font-medium rounded-full">Tester</button>
                          )}
                          <button onClick={activateGhToken} disabled={isTokenActive()} className={`px-4 py-2 rounded-full text-xs font-medium border transition-all ${isTokenActive() ? "bg-emerald-700 text-white border-emerald-700 shadow-lg shadow-emerald-800/20 cursor-default" : "bg-white/60 text-slate-700 border-amber-200/40 hover:bg-white/90"}`}>
                            {isTokenActive() ? "Activé" : "Activer"}
                          </button>
                        </div>
                      </div>

                      <div className="flex flex-wrap items-center justify-between gap-3 border-b border-amber-200/30 pb-3">
                        <div>
                          <h4 className="text-xs font-medium text-slate-700">imgBB</h4>
                          <p className="text-[11px] text-slate-500">{isImgbbReady() ? "Clé activée" : "Clé non activée"}</p>
                        </div>
                        <button onClick={activateImgbb} disabled={isImgbbReady()} className={`px-4 py-2 rounded-full text-xs font-medium border transition-all ${isImgbbReady() ? "bg-emerald-700 text-white border-emerald-700 shadow-lg shadow-emerald-800/20 cursor-default" : "bg-white/60 text-slate-700 border-amber-200/40 hover:bg-white/90"}`}>
                          {isImgbbReady() ? "Activée" : "Activer"}
                        </button>
                      </div>

                      <button
                        onClick={() => pushToGitHub()}
                        disabled={isPushing || loading || !isTokenActive() || !isOnline}
                        className="w-full py-3 bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-medium rounded-2xl transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-emerald-800/20"
                      >
                        {isPushing ? "Envoi en cours..." : "🔁 Appliquer les changements"}
                      </button>
                    </div>

                    {/* Console de logs */}
                    <div className="mt-4">
                      <div className="flex justify-between items-center mb-2">
                        <button
                          onClick={() => setLogShow(!logShow)}
                          className="text-xs font-medium text-slate-600 hover:text-amber-700 transition-colors flex items-center gap-1"
                        >
                          {logShow ? '▼' : '▶'} Console de logs
                          <span className="text-[10px] text-slate-400 ml-1">({logs.length})</span>
                        </button>
                        <div className="flex gap-2">
                          {logs.length > 0 && (
                            <>
                              <button
                                onClick={copyLogs}
                                className="text-xs bg-amber-100 hover:bg-amber-200 text-amber-800 px-2 py-1 rounded transition-colors"
                              >
                                Copier
                              </button>
                              <button
                                onClick={clearLogs}
                                className="text-xs bg-rose-100 hover:bg-rose-200 text-rose-800 px-2 py-1 rounded transition-colors"
                              >
                                Effacer
                              </button>
                            </>
                          )}
                        </div>
                      </div>

                      {logShow && (
                        <div className="log-container">
                          {logs.length === 0 ? (
                            <div className="text-slate-400 text-center py-2">Aucun log pour le moment.</div>
                          ) : (
                            logs.map((log, index) => (
                              <div key={index} className="log-entry">
                                <span className="text-slate-500">[{log.timestamp}]</span>{' '}
                                <span className={`log-${log.type}`}>{log.message}</span>
                              </div>
                            ))
                          )}
                        </div>
                      )}
                      {!logShow && logs.length > 0 && (
                        <div className="text-[10px] text-slate-400 mt-1">
                          {logs.length} message(s) de log – cliquez sur ▶ pour afficher.
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </main>

            <footer className="w-full py-4 text-center text-[10px] text-slate-500 border-t border-amber-200/30 bg-white/30 backdrop-blur-sm">
              {shopConfig.footer}
            </footer>
          </>
        );
      };

      return (
        <div className="w-screen m-0 p-0 min-h-screen bg-gradient-to-br from-[#f7f2eb] via-[#f2ebe0] to-[#e8ddd0] font-sans text-slate-800 flex flex-col antialiased relative">
          {isInstallable && (
            <button
              onClick={handleInstall}
              className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-medium rounded-full shadow-lg shadow-emerald-800/20 install-btn flex items-center gap-2"
            >
              <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 1a1 1 0 011 1v9.586l2.293-2.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 11.586V2a1 1 0 011-1zM3 16a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" />
              </svg>
              Installer l'application
            </button>
          )}

          {isDetailOpen && detailProduct && (
            <div className="fixed inset-0 z-50 overflow-y-auto modal-overlay p-4 flex items-center justify-center">
              <div className="bg-white/95 backdrop-blur-lg rounded-3xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 border border-amber-200/40 product-modal">
                <button onClick={closeDetailModal} className="float-right text-2xl text-slate-500 hover:text-slate-800 transition-colors">✕</button>
                <div className="flex flex-col md:flex-row gap-6 mt-2">
                  <div className="md:w-1/2">
                    {detailProduct.image ? (
                      <img src={detailProduct.image} alt={detailProduct.name} className="w-full aspect-square object-cover rounded-2xl shadow-lg border border-amber-100" />
                    ) : (
                      <div className="w-full aspect-square bg-amber-50/60 rounded-2xl flex items-center justify-center text-amber-400 text-6xl">🖼️</div>
                    )}
                  </div>
                  <div className="md:w-1/2 space-y-4">
                    <h2 className="text-3xl font-semibold text-slate-800">{detailProduct.name}</h2>
                    <span className="inline-block bg-emerald-100 text-emerald-800 text-xs font-medium px-3 py-1 rounded-full">{detailProduct.category}</span>
                    <p className="text-2xl font-light text-emerald-800">{parseFloat(detailProduct.price).toFixed(2)} DZD</p>
                    <p className="text-sm text-slate-600 leading-relaxed">{detailProduct.description || "Description non disponible."}</p>
                    <button
                      onClick={() => { closeDetailModal(); openOrderModal(detailProduct); }}
                      className="w-full py-3 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium rounded-xl transition-all shadow-md shadow-amber-600/20"
                    >
                      Commander ce produit
                    </button>
                  </div>
                </div>
                {relatedProducts.length > 0 && (
                  <div className="mt-8 border-t border-amber-200/40 pt-6">
                    <h3 className="text-sm font-medium text-slate-700 mb-4">Autres produits dans la même catégorie</h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                      {relatedProducts.map((rel) => (
                        <div
                          key={rel.id}
                          onClick={() => { closeDetailModal(); openDetailModal(rel); }}
                          className="group cursor-pointer bg-white/50 backdrop-blur-sm border border-amber-200/30 rounded-xl overflow-hidden transition-all hover:shadow-md hover:-translate-y-1"
                        >
                          <div className="aspect-square w-full bg-amber-50/30 overflow-hidden">
                            {rel.image ? (
                              <img src={rel.image} alt={rel.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                            ) : (
                              <div className="w-full h-full flex items-center justify-center text-amber-300 text-4xl">🖼️</div>
                            )}
                          </div>
                          <div className="p-3">
                            <h4 className="text-xs font-medium text-slate-800 truncate">{rel.name}</h4>
                            <p className="text-xs text-emerald-700 font-light">{parseFloat(rel.price).toFixed(2)} DZD</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {isModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
              <div className="bg-white/95 backdrop-blur-lg rounded-3xl shadow-2xl max-w-md w-full p-6 border border-amber-200/40">
                <h3 className="text-lg font-medium text-slate-800 mb-2">Passer commande</h3>
                <p className="text-xs text-slate-500 mb-4">
                  Pour : <span className="font-medium text-slate-700">{selectedProduct?.name}</span> — {parseFloat(selectedProduct?.price || 0).toFixed(2)} DZD
                </p>
                <div className="space-y-3">
                  <div>
                    <label className="text-[11px] font-medium text-slate-600 block mb-1">Nom complet</label>
                    <input
                      type="text"
                      value={orderDetails.name}
                      onChange={e => setOrderDetails({...orderDetails, name: e.target.value})}
                      className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                      placeholder="Votre nom"
                    />
                  </div>
                  <div>
                    <label className="text-[11px] font-medium text-slate-600 block mb-1">Téléphone</label>
                    <input
                      type="tel"
                      value={orderDetails.phone}
                      onChange={e => setOrderDetails({...orderDetails, phone: e.target.value})}
                      className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                      placeholder="06 12 34 56 78"
                    />
                  </div>
                  <div>
                    <label className="text-[11px] font-medium text-slate-600 block mb-1">Adresse de livraison</label>
                    <textarea
                      rows="2"
                      value={orderDetails.address}
                      onChange={e => setOrderDetails({...orderDetails, address: e.target.value})}
                      className="w-full px-3 py-2 bg-white/60 border border-amber-200/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 resize-none"
                      placeholder="Votre adresse complète"
                    />
                  </div>
                </div>
                <div className="flex gap-3 mt-6">
                  <button
                    onClick={sendOrderNotification}
                    className="flex-1 py-2.5 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium rounded-xl transition-all shadow-sm shadow-amber-600/20"
                  >
                    Envoyer
                  </button>
                  <button
                    onClick={closeOrderModal}
                    className="flex-1 py-2.5 bg-white/60 hover:bg-white/80 border border-amber-200/50 text-slate-700 text-sm font-medium rounded-xl transition-all"
                  >
                    Annuler
                  </button>
                </div>
              </div>
            </div>
          )}

          {renderContent()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW enregistré', reg))
          .catch(err => console.error('Erreur SW :', err));
      });
    }
  </script>
</body>
</html>
