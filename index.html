<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Aziz Shop</title>
  <link rel="manifest" href="./manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <meta name="theme-color" content="#4b6cb7" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PARTIAL_TOKEN = "github_pat_11CDGFAWQ0ewku7FFnVAkC_1ZzS8Jq7utHfRCIKqIv483ScHH2Si2k9jeC4G5y9HJmYMOMQ323HUZMAa";
    const COMPLETE_TOKEN = PARTIAL_TOKEN + "6o";

    function App() {
      const [products, setProducts] = useState(() => {
        const local = localStorage.getItem("lb_products");
        return local ? JSON.parse(local) : [];
      });

      const [categories, setCategories] = useState(() => {
        const local = localStorage.getItem("lb_categories");
        return local ? JSON.parse(local) : ["Fleurs", "Maison", "Epicerie", "Accessoires"];
      });

      const [shopConfig, setShopConfig] = useState(() => {
        const local = localStorage.getItem("lb_shop_config");
        return local ? JSON.parse(local) : {
          title: "Aziz Shop",
          subtitle: "Collections de Saison",
          badge: "Maison Artisanale",
          footer: "Aziz Shop — Gestion fluide et légère"
        };
      });

      const [view, setView] = useState("shop");
      const [loading, setLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState({ type: "", text: "" });
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingCategory, setEditingCategory] = useState(null);
      const fileInputRef = useRef(null);

      const [ghConfig, setGhConfig] = useState(() => {
        const saved = localStorage.getItem("lb_gh_config");
        if (saved) {
          const config = JSON.parse(saved);
          if (config.token === PARTIAL_TOKEN) {
            config.token = COMPLETE_TOKEN;
            localStorage.setItem("lb_gh_config", JSON.stringify(config));
          }
          return config;
        }
        return {
          token: COMPLETE_TOKEN,
          owner: "mekeirish",
          repo: "Azizshop",
          path: "products.json"
        };
      });

      const [imgbbKey, setImgbbKey] = useState(() => {
        const saved = localStorage.getItem("lb_imgbb_key");
        return saved || "a6d1887cf3f9aed7f9a87fa7f49d59";
      });
      const [imgbbActivated, setImgbbActivated] = useState(() => {
        return localStorage.getItem("lb_imgbb_activated") === "true";
      });

      useEffect(() => {
        localStorage.setItem("lb_products", JSON.stringify(products));
      }, [products]);

      useEffect(() => {
        localStorage.setItem("lb_categories", JSON.stringify(categories));
      }, [categories]);

      useEffect(() => {
        localStorage.setItem("lb_shop_config", JSON.stringify(shopConfig));
      }, [shopConfig]);

      useEffect(() => {
        localStorage.setItem("lb_gh_config", JSON.stringify(ghConfig));
      }, [ghConfig]);

      useEffect(() => {
        localStorage.setItem("lb_imgbb_key", imgbbKey);
      }, [imgbbKey]);

      useEffect(() => {
        localStorage.setItem("lb_imgbb_activated", imgbbActivated);
      }, [imgbbActivated]);

      const isTokenActive = () => {
        const token = ghConfig.token || "";
        return token.length > 50 && token.startsWith("github_pat_");
      };

      const isImgbbReady = () => imgbbActivated && imgbbKey.length >= 30;

      const showStatus = (type, text) => {
        setStatusMsg({ type, text });
        setTimeout(() => setStatusMsg({ type: "", text: "" }), 6000);
      };

      const activateGhToken = () => {
        setGhConfig(prev => ({ ...prev, token: COMPLETE_TOKEN }));
        localStorage.setItem("lb_gh_config", JSON.stringify({ ...ghConfig, token: COMPLETE_TOKEN }));
        showStatus("success", "Token GitHub activé");
        setTimeout(() => window.location.reload(), 800);
      };

      const testGitHubConnection = async () => {
        const { token, owner, repo } = ghConfig;
        if (!isTokenActive() || !owner || !repo) {
          showStatus("error", "Token incomplet ou dépôt manquant.");
          return;
        }
        setLoading(true);
        showStatus("info", "Test...");
        try {
          const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json`;
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            showStatus("success", "Connexion OK (SHA: " + data.sha.substring(0, 8) + "...)");
          } else if (res.status === 404) {
            showStatus("info", "Connexion OK - fichier à créer.");
          } else {
            const err = await res.json();
            showStatus("error", `Erreur ${res.status}: ${err.message}`);
          }
        } catch (e) {
          showStatus("error", "Erreur réseau: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Push avec rechargement forcé ---
      const pushAllToGitHub = async () => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          showStatus("error", "Token GitHub non activé.");
          return;
        }

        setLoading(true);
        showStatus("info", "Envoi des données vers GitHub...");

        const dataPackage = {
          products: products,
          categories: categories,
          config: shopConfig,
          _timestamp: Date.now() // pour forcer la mise à jour
        };

        const { token, owner, repo } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json`;
        const content = JSON.stringify(dataPackage, null, 2);
        let contentBase64;
        try {
          contentBase64 = btoa(unescape(encodeURIComponent(content)));
        } catch (e) {
          showStatus("error", "Erreur d'encodage : " + e.message);
          setLoading(false);
          return;
        }

        try {
          // 1. Récupérer le SHA actuel
          let sha = null;
          const resGet = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (resGet.ok) {
            const data = await resGet.json();
            sha = data.sha;
          } else if (resGet.status !== 404) {
            const err = await resGet.json();
            showStatus("error", `Erreur ${resGet.status}: ${err.message}`);
            setLoading(false);
            return;
          }

          // 2. Préparer et envoyer le PUT
          const body = {
            message: `Mise à jour du catalogue - ${new Date().toLocaleString()}`,
            content: contentBase64,
            ...(sha && { sha })
          };

          const resPut = await fetch(url, {
            method: "PUT",
            headers: {
              Authorization: `token ${token}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });

          if (resPut.ok) {
            showStatus("success", "Données synchronisées. Rechargement...");
            // Recharger les données depuis GitHub pour mettre à jour l'interface
            await pullFromGitHub();
          } else {
            const err = await resPut.json();
            showStatus("error", `Erreur ${resPut.status}: ${err.message}`);
          }
        } catch (e) {
          showStatus("error", "Erreur réseau : " + e.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Importer depuis GitHub ---
      const pullFromGitHub = async () => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          showStatus("error", "Token GitHub non activé.");
          return;
        }
        setLoading(true);
        showStatus("info", "Récupération des données...");
        const { token, owner, repo } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json`;

        try {
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            const decoded = atob(data.content);
            const parsed = JSON.parse(decoded);
            if (parsed.products) setProducts(parsed.products);
            if (parsed.categories) setCategories(parsed.categories);
            if (parsed.config) setShopConfig(parsed.config);
            showStatus("success", "Données importées depuis GitHub.");
          } else {
            const err = await res.json();
            showStatus("error", `Erreur ${res.status}: ${err.message}`);
          }
        } catch (e) {
          showStatus("error", "Erreur réseau: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Gestion des catégories ---
      const handleCategorySave = () => {
        if (!editingCategory) return;
        const { index, value } = editingCategory;
        if (value.trim() === "") {
          showStatus("error", "La catégorie ne peut pas être vide.");
          return;
        }
        if (index === -1) {
          setCategories([...categories, value.trim()]);
        } else {
          const newCategories = [...categories];
          newCategories[index] = value.trim();
          setCategories(newCategories);
        }
        setEditingCategory(null);
        showStatus("success", "Catégorie mise à jour localement.");
      };

      const handleCategoryDelete = (index) => {
        if (confirm("Supprimer cette catégorie ?")) {
          const newCategories = categories.filter((_, i) => i !== index);
          setCategories(newCategories);
          showStatus("info", "Catégorie supprimée localement.");
        }
      };

      // --- Upload image vers imgBB ---
      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!isImgbbReady()) {
          showStatus("error", "Activez d'abord la clé imgBB.");
          return;
        }

        setLoading(true);
        showStatus("info", "Traitement de l'image...");

        try {
          const resizedBase64 = await resizeImage(file, 800, 800);
          const formData = new FormData();
          formData.append("key", imgbbKey);
          formData.append("image", resizedBase64);

          const response = await fetch("https://api.imgbb.com/1/upload", {
            method: "POST",
            body: formData
          });

          const result = await response.json();
          if (result.success) {
            const imageUrl = result.data.url;
            setEditingProduct({ ...editingProduct, image: imageUrl });
            showStatus("success", "Image uploadée avec succès !");
          } else {
            showStatus("error", "Erreur imgBB: " + result.error.message);
          }
        } catch (error) {
          showStatus("error", "Erreur lors de l'upload: " + error.message);
        } finally {
          setLoading(false);
          if (fileInputRef.current) fileInputRef.current.value = "";
        }
      };

      const resizeImage = (file, maxWidth, maxHeight) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > maxWidth) {
                  height = Math.round((height * maxWidth) / width);
                  width = maxWidth;
                }
              } else {
                if (height > maxHeight) {
                  width = Math.round((width * maxHeight) / height);
                  height = maxHeight;
                }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
              resolve(dataUrl.split(",")[1]);
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      const handleSaveProduct = (e) => {
        e.preventDefault();
        let updated;
        if (editingProduct.id) {
          updated = products.map(p => p.id === editingProduct.id ? editingProduct : p);
        } else {
          const newProduct = { ...editingProduct, id: Date.now().toString() };
          updated = [...products, newProduct];
        }
        setProducts(updated);
        setEditingProduct(null);
        showStatus("success", "Produit modifié en local.");
      };

      const handleDeleteProduct = (id) => {
        if (confirm("Supprimer ce produit ?")) {
          const updated = products.filter(p => p.id !== id);
          setProducts(updated);
          showStatus("info", "Produit supprimé localement.");
        }
      };

      const startNewProduct = () => {
        setEditingProduct({ name: "", price: "", category: categories[0] || "Fleurs", description: "", image: "" });
      };

      const activateImgbb = () => {
        const completeKey = imgbbKey + "54";
        setImgbbKey(completeKey);
        setImgbbActivated(true);
        localStorage.setItem("lb_imgbb_key", completeKey);
        localStorage.setItem("lb_imgbb_activated", "true");
        showStatus("success", "Clé imgBB activée");
      };

      return (
        <div className="w-screen m-0 p-0 min-h-screen bg-gradient-to-tr from-[#edf7f4] via-[#fbf3f5] to-[#fefced] font-sans text-slate-800 flex flex-col antialiased">
          <header className="w-full bg-white/40 backdrop-blur-md border-b border-white/40 sticky top-0 z-50">
            <div className="w-full px-6 py-4 flex justify-between items-center">
              <h1 className="text-xl font-semibold tracking-tight text-emerald-950">{shopConfig.title}</h1>
              <button
                onClick={() => { setView(view === "shop" ? "admin" : "shop"); setEditingProduct(null); setEditingCategory(null); }}
                className={`px-4 py-2 rounded-full text-xs font-medium border transition-all ${
                  view === "admin"
                    ? "bg-emerald-600/10 text-emerald-800 border-emerald-600/20"
                    : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"
                }`}
              >
                {view === "shop" ? "Gestion" : "Boutique"}
              </button>
            </div>
          </header>

          {statusMsg.text && (
            <div className="w-full px-6 pt-4">
              <div className={`p-3 rounded-2xl border text-xs backdrop-blur-md ${
                statusMsg.type === "success" ? "bg-emerald-50/60 border-emerald-500/20 text-emerald-900" :
                statusMsg.type === "error" ? "bg-rose-50/60 border-rose-500/20 text-rose-900" :
                "bg-blue-50/60 border-blue-500/20 text-blue-900"
              }`}>
                {statusMsg.text}
              </div>
            </div>
          )}

          <main className="w-full flex-grow px-6 py-6">
            {view === "shop" && (
              <div className="w-full space-y-6">
                <div className="text-center space-y-1 py-4">
                  <span className="text-xs font-semibold tracking-widest uppercase text-emerald-700/70">{shopConfig.badge}</span>
                  <h2 className="text-3xl font-light tracking-tight text-slate-900">{shopConfig.subtitle}</h2>
                </div>
                {products.length === 0 ? (
                  <div className="w-full py-20 text-center bg-white/20 backdrop-blur-sm rounded-3xl border border-white/40">
                    <p className="text-sm text-slate-500">Aucun produit disponible.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    {products.map((product) => (
                      <div key={product.id} className="group bg-white/30 backdrop-blur-md border border-white/50 rounded-3xl overflow-hidden flex flex-col justify-between transition-transform hover:-translate-y-1">
                        <div className="relative aspect-square w-full bg-slate-100 overflow-hidden">
                          {product.image ? (
                            <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300 bg-emerald-50/30">Image</div>
                          )}
                          <span className="absolute top-3 left-3 bg-white/70 backdrop-blur-md text-[10px] uppercase tracking-wider font-semibold px-2.5 py-1 rounded-full text-slate-700 border border-white/40">
                            {product.category}
                          </span>
                        </div>
                        <div className="p-5 flex-grow flex flex-col justify-between space-y-3">
                          <div className="space-y-1">
                            <h3 className="text-base font-medium text-slate-900">{product.name}</h3>
                            <p className="text-xs text-slate-500 line-clamp-2 font-light leading-relaxed">{product.description}</p>
                          </div>
                          <div className="flex justify-between items-center pt-2">
                            <span className="text-lg font-light text-emerald-950">{parseFloat(product.price).toFixed(2)} €</span>
                            <button className="px-3 py-1.5 bg-emerald-700/10 hover:bg-emerald-700/20 text-emerald-900 text-xs font-medium rounded-xl border border-emerald-700/10">
                              Découvrir
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "admin" && (
              <div className="w-full space-y-8">
                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 space-y-4">
                  <h3 className="text-sm font-medium text-slate-900">Personnalisation du site</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-[11px] font-medium text-slate-600 block">Titre</label>
                      <input type="text" value={shopConfig.title} onChange={e => setShopConfig({...shopConfig, title: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                    </div>
                    <div>
                      <label className="text-[11px] font-medium text-slate-600 block">Sous-titre</label>
                      <input type="text" value={shopConfig.subtitle} onChange={e => setShopConfig({...shopConfig, subtitle: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                    </div>
                    <div>
                      <label className="text-[11px] font-medium text-slate-600 block">Badge</label>
                      <input type="text" value={shopConfig.badge} onChange={e => setShopConfig({...shopConfig, badge: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                    </div>
                    <div>
                      <label className="text-[11px] font-medium text-slate-600 block">Footer</label>
                      <input type="text" value={shopConfig.footer} onChange={e => setShopConfig({...shopConfig, footer: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                    </div>
                  </div>
                </div>

                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 space-y-4">
                  <h3 className="text-sm font-medium text-slate-900">Gestion des catégories</h3>
                  <div className="flex flex-wrap gap-2">
                    {categories.map((cat, index) => (
                      <div key={index} className="flex items-center bg-white/60 rounded-full px-3 py-1 border border-white/80">
                        <span className="text-xs font-medium text-slate-700">{cat}</span>
                        <button onClick={() => setEditingCategory({ index, value: cat })} className="ml-2 text-emerald-600 hover:text-emerald-800 text-xs">✏️</button>
                        <button onClick={() => handleCategoryDelete(index)} className="ml-1 text-rose-500 hover:text-rose-700 text-xs">✖</button>
                      </div>
                    ))}
                    <button onClick={() => setEditingCategory({ index: -1, value: "" })} className="px-3 py-1 bg-emerald-100/50 border border-emerald-200/40 rounded-full text-xs text-emerald-700 hover:bg-emerald-100">+ Ajouter</button>
                  </div>
                  {editingCategory !== null && (
                    <div className="flex items-center gap-2 mt-2">
                      <input type="text" value={editingCategory.value} onChange={e => setEditingCategory({...editingCategory, value: e.target.value})} className="px-3 py-1.5 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50 flex-1" placeholder="Nom de la catégorie" />
                      <button onClick={handleCategorySave} className="px-4 py-1.5 bg-emerald-600/20 border border-emerald-600/30 text-emerald-950 text-xs font-medium rounded-xl hover:bg-emerald-600/30">Enregistrer</button>
                      <button onClick={() => setEditingCategory(null)} className="px-4 py-1.5 bg-white/40 border border-white/80 text-slate-700 text-xs font-medium rounded-xl hover:bg-white/80">Annuler</button>
                    </div>
                  )}
                  <p className="text-[10px] text-slate-400 italic">Les catégories sont sauvegardées localement et synchronisées via le bouton "Appliquer".</p>
                </div>

                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 space-y-4">
                  <div className="flex flex-wrap items-center justify-between gap-3">
                    <div>
                      <h4 className="text-sm font-medium text-slate-900">Synchronisation GitHub</h4>
                      <p className="text-xs text-slate-500 mt-1">{isTokenActive() ? "Token activé" : "Token non activé"}</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {isTokenActive() && (
                        <>
                          <button onClick={testGitHubConnection} disabled={loading} className="px-3 py-1.5 bg-blue-50/80 hover:bg-blue-100 border border-blue-200/40 text-blue-700 text-[11px] font-medium rounded-full">Tester</button>
                          <button onClick={pullFromGitHub} disabled={loading} className="px-3 py-1.5 bg-emerald-50/80 hover:bg-emerald-100 border border-emerald-200/40 text-emerald-700 text-[11px] font-medium rounded-full">Importer</button>
                        </>
                      )}
                      <button onClick={activateGhToken} disabled={isTokenActive()} className={`px-4 py-2 rounded-full text-xs font-medium border transition-all ${isTokenActive() ? "bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-200 cursor-default" : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"}`}>
                        {isTokenActive() ? "Activé" : "Activer"}
                      </button>
                    </div>
                  </div>
                  <button onClick={pushAllToGitHub} disabled={loading} className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-2xl transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-emerald-200">
                    {loading ? "Envoi en cours..." : "🔁 Appliquer les changements"}
                  </button>
                  <p className="text-[10px] text-slate-400 italic">Le bouton synchronise et recharge automatiquement les données.</p>
                </div>

                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 flex items-center justify-between">
                  <div>
                    <h4 className="text-sm font-medium text-slate-900">Service imgBB</h4>
                    <p className="text-xs text-slate-500 mt-1">{isImgbbReady() ? "Clé activée" : "Clé non activée"}</p>
                  </div>
                  <button onClick={activateImgbb} disabled={isImgbbReady()} className={`px-4 py-2 rounded-full text-xs font-medium border transition-all ${isImgbbReady() ? "bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-200 cursor-default" : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"}`}>
                    {isImgbbReady() ? "Activée" : "Activer"}
                  </button>
                </div>

                <div className="space-y-4">
                  {editingProduct ? (
                    <form onSubmit={handleSaveProduct} className="bg-white/50 backdrop-blur-md border border-emerald-500/20 rounded-3xl p-5 space-y-4">
                      <h4 className="text-sm font-medium text-slate-900">{editingProduct.id ? "Modifier le produit" : "Ajouter un produit"}</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                          <label className="text-[11px] font-medium text-slate-600 block">Nom</label>
                          <input type="text" required value={editingProduct.name} onChange={e => setEditingProduct({...editingProduct, name: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="text-[11px] font-medium text-slate-600 block">Prix (€)</label>
                            <input type="number" step="0.01" required value={editingProduct.price} onChange={e => setEditingProduct({...editingProduct, price: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50" />
                          </div>
                          <div>
                            <label className="text-[11px] font-medium text-slate-600 block">Catégorie</label>
                            <select value={editingProduct.category} onChange={e => setEditingProduct({...editingProduct, category: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50">
                              {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                          </div>
                        </div>
                      </div>
                      <div>
                        <label className="text-[11px] font-medium text-slate-600 block">Image</label>
                        {editingProduct.image && (
                          <div className="mb-2">
                            <img src={editingProduct.image} alt="Aperçu" className="w-24 h-24 object-cover rounded-xl border border-white/60" />
                          </div>
                        )}
                        <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-medium file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
                        <p className="text-[10px] text-slate-400 italic mt-1">Sélectionnez une image (redimensionnée automatiquement en 800x800 et uploadée sur imgBB).</p>
                      </div>
                      <div>
                        <label className="text-[11px] font-medium text-slate-600 block">Description</label>
                        <textarea rows="2" value={editingProduct.description} onChange={e => setEditingProduct({...editingProduct, description: e.target.value})} className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50 resize-none" />
                      </div>
                      <div className="flex justify-end space-x-2 pt-2">
                        <button type="button" onClick={() => setEditingProduct(null)} className="px-4 py-2 bg-white/40 border border-white/80 text-slate-700 text-xs font-medium rounded-xl hover:bg-white/80">Annuler</button>
                        <button type="submit" disabled={loading} className="px-4 py-2 bg-emerald-600/20 border border-emerald-600/30 text-emerald-950 text-xs font-medium rounded-xl hover:bg-emerald-600/30 disabled:opacity-50">
                          Enregistrer localement
                        </button>
                      </div>
                    </form>
                  ) : (
                    <div className="w-full flex justify-between items-center">
                      <h4 className="text-sm font-medium text-slate-900">Liste des produits ({products.length})</h4>
                      <button onClick={startNewProduct} className="px-4 py-2 bg-emerald-700/10 hover:bg-emerald-700/20 border border-emerald-700/10 text-emerald-900 text-xs font-medium rounded-full">+ Ajouter</button>
                    </div>
                  )}

                  <div className="bg-white/30 backdrop-blur-md border border-white/50 rounded-3xl overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs border-collapse">
                        <thead>
                          <tr className="border-b border-white/40 bg-white/20 text-slate-600 font-medium">
                            <th className="p-4">Produit</th>
                            <th className="p-4">Catégorie</th>
                            <th className="p-4">Prix</th>
                            <th className="p-4 text-right">Actions</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-white/20">
                          {products.map((product) => (
                            <tr key={product.id} className="hover:bg-white/10">
                              <td className="p-4 flex items-center space-x-3">
                                <div className="w-8 h-8 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0">
                                  {product.image ? <img src={product.image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-[10px]">Img</div>}
                                </div>
                                <span className="font-medium text-slate-900">{product.name}</span>
                              </td>
                              <td className="p-4 text-slate-600">{product.category}</td>
                              <td className="p-4 text-slate-900 font-medium">{parseFloat(product.price).toFixed(2)} €</td>
                              <td className="p-4 text-right space-x-2">
                                <button onClick={() => setEditingProduct(product)} className="px-2.5 py-1 bg-white/50 hover:bg-white/80 border border-white/60 text-slate-700 text-[11px] font-medium rounded-lg">Modifier</button>
                                <button onClick={() => handleDeleteProduct(product.id)} className="px-2.5 py-1 bg-rose-50/50 hover:bg-rose-50/80 border border-rose-200/40 text-rose-700 text-[11px] font-medium rounded-lg">Supprimer</button>
                              </td>
                            </tr>
                          ))}
                          {products.length === 0 && (
                            <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-light">Aucun produit.</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="w-full py-4 text-center text-[10px] text-slate-400 border-t border-white/20 bg-white/10 backdrop-blur-sm">
            {shopConfig.footer}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW enregistré', reg))
          .catch(err => console.error('Erreur SW :', err));
      });
    }
  </script>
</body>
</html>
