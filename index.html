<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Aziz Shop</title>
  <link rel="manifest" href="./manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <meta name="theme-color" content="#4b6cb7" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const PARTIAL_TOKEN = "github_pat_11CDGFAWQ0ewku7FFnVAkC_1ZzS8Jq7utHfRCIKqIv483ScHH2Si2k9jeC4G5y9HJmYMOMQ323HUZMAa";
    const COMPLETE_TOKEN = PARTIAL_TOKEN + "6o";

    function App() {
      const initialProducts = [
        {
          id: "1",
          name: "Bouquet Printemps Eternel",
          price: 45.0,
          category: "Fleurs",
          description: "Un assemblage raffine de tulipes pastel, de pivoines blanches et de branches d'eucalyptus fraiches.",
          image: "https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=500&auto=format&fit=crop&q=60"
        },
        {
          id: "2",
          name: "Bougie Fleur de Cerisier",
          price: 24.0,
          category: "Maison",
          description: "Cire vegetale coulee a la main, diffusant des notes douces et fruitrees de Sakura du Japon.",
          image: "https://images.unsplash.com/photo-1603006905003-be475563bc59?w=500&auto=format&fit=crop&q=60"
        },
        {
          id: "3",
          name: "Coffret Infusion Detox Floral",
          price: 19.5,
          category: "Epicerie",
          description: "Melange biologique de camomille, de boutons de rose et de menthe poivree pour eveiller les sens.",
          image: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500&auto=format&fit=crop&q=60"
        }
      ];

      const [products, setProducts] = useState(() => {
        const localData = localStorage.getItem("lb_vitrine_products");
        return localData ? JSON.parse(localData) : initialProducts;
      });

      const [view, setView] = useState("shop");
      const [loading, setLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState({ type: "", text: "" });

      // GitHub config avec auto‑complétion
      const [ghConfig, setGhConfig] = useState(() => {
        const saved = localStorage.getItem("lb_vitrine_gh_config");
        if (saved) {
          const config = JSON.parse(saved);
          if (config.token === PARTIAL_TOKEN) {
            config.token = COMPLETE_TOKEN;
            localStorage.setItem("lb_vitrine_gh_config", JSON.stringify(config));
          }
          return config;
        }
        return {
          token: COMPLETE_TOKEN,
          owner: "mekeirish",
          repo: "Azizshop",
          path: "products.json"
        };
      });

      const [editingProduct, setEditingProduct] = useState(null);

      // imgBB
      const [imgbbKey, setImgbbKey] = useState(() => {
        const saved = localStorage.getItem("lb_vitrine_imgbb_key");
        return saved || "a6d1887cf3f9aed7f9a87fa7f49d59";
      });
      const [imgbbActivated, setImgbbActivated] = useState(() => {
        return localStorage.getItem("lb_vitrine_imgbb_activated") === "true";
      });

      // Persistance
      useEffect(() => {
        localStorage.setItem("lb_vitrine_products", JSON.stringify(products));
      }, [products]);

      useEffect(() => {
        localStorage.setItem("lb_vitrine_gh_config", JSON.stringify(ghConfig));
      }, [ghConfig]);

      useEffect(() => {
        localStorage.setItem("lb_vitrine_imgbb_key", imgbbKey);
      }, [imgbbKey]);

      useEffect(() => {
        localStorage.setItem("lb_vitrine_imgbb_activated", imgbbActivated);
      }, [imgbbActivated]);

      const isTokenActive = () => {
        const token = ghConfig.token || "";
        return token.length > 50 && token.startsWith("github_pat_");
      };

      // --- Activation manuelle (bouton) ---
      const activateGhToken = () => {
        setGhConfig(prev => ({ ...prev, token: COMPLETE_TOKEN }));
        localStorage.setItem("lb_vitrine_gh_config", JSON.stringify({ ...ghConfig, token: COMPLETE_TOKEN }));
        showStatus("success", "Token GitHub activé");
        setTimeout(() => window.location.reload(), 800);
      };

      // --- Test connexion ---
      const testGitHubConnection = async () => {
        const { token, owner, repo, path } = ghConfig;
        if (!isTokenActive() || !owner || !repo) {
          showStatus("error", "Token incomplet ou dépôt manquant.");
          return;
        }
        setLoading(true);
        showStatus("info", "Test de connexion...");
        try {
          const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            showStatus("success", "Connexion OK - fichier trouvé (SHA: " + data.sha.substring(0, 8) + "...)");
          } else if (res.status === 404) {
            showStatus("info", "Connexion OK - le fichier n'existe pas encore.");
          } else if (res.status === 401) {
            showStatus("error", "Erreur 401 : Token invalide. Vérifiez vos identifiants GitHub.");
          } else {
            const err = await res.json();
            showStatus("error", `Erreur ${res.status}: ${err.message}`);
          }
        } catch (e) {
          showStatus("error", "Erreur réseau: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Sauvegarde ---
      const saveToGitHub = async (updatedProducts) => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          showStatus("info", "Sauvegarde locale uniquement. Activez le token GitHub.");
          return;
        }

        setLoading(true);
        showStatus("info", "Synchronisation avec GitHub...");

        const { token, owner, repo, path } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const content = JSON.stringify(updatedProducts, null, 2);
        const contentBase64 = btoa(content);

        try {
          let sha = null;
          const resGet = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });

          if (resGet.ok) {
            const dataGet = await resGet.json();
            sha = dataGet.sha;
          } else if (resGet.status !== 404) {
            const errData = await resGet.json();
            showStatus("error", `Erreur GitHub (${resGet.status}): ${errData.message}`);
            setLoading(false);
            return;
          }

          const body = {
            message: "Mise à jour du catalogue (Aziz Shop)",
            content: contentBase64,
            ...(sha && { sha })
          };

          const resPut = await fetch(url, {
            method: "PUT",
            headers: {
              Authorization: `token ${token}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });

          if (resPut.ok) {
            showStatus("success", "Catalogue synchronisé avec succès sur GitHub !");
          } else {
            const errData = await resPut.json();
            showStatus("error", `Erreur GitHub (${resPut.status}): ${errData.message}`);
          }
        } catch (error) {
          showStatus("error", "Erreur réseau : " + error.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Importer ---
      const fetchFromGitHub = async () => {
        if (!isTokenActive() || !ghConfig.owner || !ghConfig.repo) {
          showStatus("error", "Token incomplet ou dépôt manquant.");
          return;
        }
        setLoading(true);
        showStatus("info", "Récupération des données distantes...");
        const { token, owner, repo, path } = ghConfig;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

        try {
          const res = await fetch(url, {
            headers: { Authorization: `token ${token}` }
          });

          if (res.ok) {
            const data = await res.json();
            const decodedContent = atob(data.content);
            const fetchedProducts = JSON.parse(decodedContent);
            setProducts(fetchedProducts);
            showStatus("success", "Catalogue local mis à jour depuis GitHub.");
          } else {
            const errData = await res.json();
            showStatus("error", `Erreur ${res.status}: ${errData.message}`);
          }
        } catch (error) {
          showStatus("error", "Erreur réseau : " + error.message);
        } finally {
          setLoading(false);
        }
      };

      // --- Produits ---
      const handleSaveProduct = (e) => {
        e.preventDefault();
        let updated;
        if (editingProduct.id) {
          updated = products.map(p => p.id === editingProduct.id ? editingProduct : p);
        } else {
          const newProduct = { ...editingProduct, id: Date.now().toString() };
          updated = [...products, newProduct];
        }
        setProducts(updated);
        setEditingProduct(null);
        saveToGitHub(updated);
      };

      const handleDeleteProduct = (id) => {
        if (confirm("Supprimer ce produit définitivement ?")) {
          const updated = products.filter(p => p.id !== id);
          setProducts(updated);
          saveToGitHub(updated);
        }
      };

      const startNewProduct = () => {
        setEditingProduct({ name: "", price: "", category: "Fleurs", description: "", image: "" });
      };

      // --- imgBB ---
      const activateImgbb = () => {
        const completeKey = imgbbKey + "54";
        setImgbbKey(completeKey);
        setImgbbActivated(true);
        localStorage.setItem("lb_vitrine_imgbb_key", completeKey);
        localStorage.setItem("lb_vitrine_imgbb_activated", "true");
        showStatus("success", "Clé imgBB activée (complétée avec 54)");
      };

      // --- Utilitaires ---
      const showStatus = (type, text) => {
        setStatusMsg({ type, text });
        setTimeout(() => setStatusMsg({ type: "", text: "" }), 6000);
      };

      return (
        <div className="w-screen m-0 p-0 min-h-screen bg-gradient-to-tr from-[#edf7f4] via-[#fbf3f5] to-[#fefced] font-sans text-slate-800 flex flex-col antialiased selection:bg-emerald-100 selection:text-emerald-900">
          <header className="w-full bg-white/40 backdrop-blur-md border-b border-white/40 sticky top-0 z-50 transition-all">
            <div className="w-full px-6 py-4 flex justify-between items-center">
              <div className="flex items-center space-x-2">
                <span className="text-xl text-emerald-700 font-serif">Aziz</span>
                <h1 className="text-xl font-semibold tracking-tight text-emerald-950">Aziz Shop</h1>
              </div>
              <button 
                onClick={() => { setView(view === "shop" ? "admin" : "shop"); setEditingProduct(null); }}
                className={`px-4 py-2 rounded-full text-xs font-medium border transition-all duration-300 ${
                  view === "admin" 
                    ? "bg-emerald-600/10 text-emerald-800 border-emerald-600/20" 
                    : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"
                }`}
              >
                {view === "shop" ? "Menu Gestion" : "Voir Boutique"}
              </button>
            </div>
          </header>

          {statusMsg.text && (
            <div className="w-full px-6 pt-4">
              <div className={`p-3 rounded-2xl border text-xs backdrop-blur-md transition-all ${
                statusMsg.type === "success" ? "bg-emerald-50/60 border-emerald-500/20 text-emerald-900" :
                statusMsg.type === "error" ? "bg-rose-50/60 border-rose-500/20 text-rose-900" :
                "bg-blue-50/60 border-blue-500/20 text-blue-900"
              }`}>
                {statusMsg.text}
              </div>
            </div>
          )}

          <main className="w-full flex-grow px-6 py-6">
            {view === "shop" && (
              <div className="w-full space-y-6">
                <div className="text-center space-y-1 py-4">
                  <span className="text-xs font-semibold tracking-widest uppercase text-emerald-700/70">Maison Artisanale</span>
                  <h2 className="text-3xl font-light tracking-tight text-slate-900">Collections de Saison</h2>
                </div>
                {products.length === 0 ? (
                  <div className="w-full py-20 text-center bg-white/20 backdrop-blur-sm rounded-3xl border border-white/40">
                    <p className="text-sm text-slate-500">Aucun produit disponible pour le moment.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    {products.map((product) => (
                      <div key={product.id} className="group bg-white/30 backdrop-blur-md border border-white/50 rounded-3xl overflow-hidden flex flex-col justify-between transition-transform duration-300 hover:-translate-y-1">
                        <div className="relative aspect-square w-full bg-slate-100 overflow-hidden">
                          {product.image ? (
                            <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-300 bg-emerald-50/30">Image</div>
                          )}
                          <span className="absolute top-3 left-3 bg-white/70 backdrop-blur-md text-[10px] uppercase tracking-wider font-semibold px-2.5 py-1 rounded-full text-slate-700 border border-white/40">
                            {product.category}
                          </span>
                        </div>
                        <div className="p-5 flex-grow flex flex-col justify-between space-y-3">
                          <div className="space-y-1">
                            <h3 className="text-base font-medium text-slate-900">{product.name}</h3>
                            <p className="text-xs text-slate-500 line-clamp-2 font-light leading-relaxed">{product.description}</p>
                          </div>
                          <div className="flex justify-between items-center pt-2">
                            <span className="text-lg font-light text-emerald-950">{parseFloat(product.price).toFixed(2)} EUR</span>
                            <button className="px-3 py-1.5 bg-emerald-700/10 hover:bg-emerald-700/20 text-emerald-900 text-xs font-medium rounded-xl border border-emerald-700/10 transition-all">
                              Découvrir
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "admin" && (
              <div className="w-full space-y-6">
                {/* GITHUB - version épurée */}
                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 flex items-center justify-between">
                  <div>
                    <h4 className="text-sm font-medium text-slate-900">Synchronisation GitHub</h4>
                    <p className="text-xs text-slate-500 mt-1">
                      {isTokenActive() 
                        ? "Token activé - synchronisation distante disponible" 
                        : "Token non activé - cliquez sur le bouton pour l'activer"}
                    </p>
                  </div>
                  <div className="flex items-center gap-2">
                    {isTokenActive() && (
                      <>
                        <button 
                          onClick={testGitHubConnection}
                          disabled={loading}
                          className="px-3 py-1.5 bg-blue-50/80 hover:bg-blue-100 border border-blue-200/40 text-blue-700 text-[11px] font-medium rounded-full transition-all"
                        >
                          Tester
                        </button>
                        <button 
                          onClick={fetchFromGitHub}
                          disabled={loading}
                          className="px-3 py-1.5 bg-emerald-50/80 hover:bg-emerald-100 border border-emerald-200/40 text-emerald-700 text-[11px] font-medium rounded-full transition-all"
                        >
                          Importer
                        </button>
                      </>
                    )}
                    <button
                      onClick={activateGhToken}
                      disabled={isTokenActive()}
                      className={`px-4 py-2 rounded-full text-xs font-medium border transition-all duration-300 ${
                        isTokenActive()
                          ? "bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-200 cursor-default"
                          : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"
                      }`}
                    >
                      {isTokenActive() ? "Activé" : "Activer"}
                    </button>
                  </div>
                </div>

                {/* IMGBB */}
                <div className="bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl p-5 flex items-center justify-between">
                  <div>
                    <h4 className="text-sm font-medium text-slate-900">Service imgBB</h4>
                    <p className="text-xs text-slate-500 mt-1">
                      {imgbbActivated && imgbbKey.length >= 30
                        ? "Clé activée"
                        : "Clé non activée - cliquez sur le bouton pour l'activer"}
                    </p>
                  </div>
                  <button
                    onClick={activateImgbb}
                    disabled={imgbbActivated && imgbbKey.length >= 30}
                    className={`px-4 py-2 rounded-full text-xs font-medium border transition-all duration-300 ${
                      imgbbActivated && imgbbKey.length >= 30
                        ? "bg-emerald-500 text-white border-emerald-500 shadow-lg shadow-emerald-200 cursor-default"
                        : "bg-white/60 text-slate-700 border-white/80 hover:bg-white/90"
                    }`}
                  >
                    {imgbbActivated && imgbbKey.length >= 30 ? "Activée" : "Activer"}
                  </button>
                </div>

                {/* Formulaire produit */}
                {editingProduct ? (
                  <form onSubmit={handleSaveProduct} className="bg-white/50 backdrop-blur-md border border-emerald-500/20 rounded-3xl p-5 space-y-4">
                    <h4 className="text-sm font-medium text-slate-900">
                      {editingProduct.id ? "Modifier le produit" : "Ajouter un nouveau produit"}
                    </h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div className="space-y-1">
                        <label className="text-[11px] font-medium text-slate-600 block">Nom du produit</label>
                        <input 
                          type="text" 
                          required
                          value={editingProduct.name}
                          onChange={e => setEditingProduct({...editingProduct, name: e.target.value})}
                          className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50"
                        />
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="space-y-1">
                          <label className="text-[11px] font-medium text-slate-600 block">Prix (EUR)</label>
                          <input 
                            type="number" 
                            step="0.01"
                            required
                            value={editingProduct.price}
                            onChange={e => setEditingProduct({...editingProduct, price: e.target.value})}
                            className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50"
                          />
                        </div>
                        <div className="space-y-1">
                          <label className="text-[11px] font-medium text-slate-600 block">Catégorie</label>
                          <select 
                            value={editingProduct.category}
                            onChange={e => setEditingProduct({...editingProduct, category: e.target.value})}
                            className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50"
                          >
                            <option value="Fleurs">Fleurs</option>
                            <option value="Maison">Maison</option>
                            <option value="Epicerie">Epicerie</option>
                            <option value="Accessoires">Accessoires</option>
                          </select>
                        </div>
                      </div>
                    </div>
                    <div className="space-y-1">
                      <label className="text-[11px] font-medium text-slate-600 block">URL de l'image</label>
                      <input 
                        type="url" 
                        value={editingProduct.image}
                        onChange={e => setEditingProduct({...editingProduct, image: e.target.value})}
                        placeholder="https://images.unsplash.com/..."
                        className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50"
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="text-[11px] font-medium text-slate-600 block">Description courte</label>
                      <textarea 
                        rows="2"
                        value={editingProduct.description}
                        onChange={e => setEditingProduct({...editingProduct, description: e.target.value})}
                        className="w-full px-3 py-2 bg-white/60 border border-white/80 rounded-xl text-xs focus:outline-none focus:border-emerald-500/50 resize-none"
                      />
                    </div>
                    <div className="flex justify-end space-x-2 pt-2">
                      <button 
                        type="button"
                        onClick={() => setEditingProduct(null)}
                        className="px-4 py-2 bg-white/40 border border-white/80 text-slate-700 text-xs font-medium rounded-xl hover:bg-white/80 transition-all"
                      >
                        Annuler
                      </button>
                      <button 
                        type="submit"
                        disabled={loading}
                        className="px-4 py-2 bg-emerald-600/20 border border-emerald-600/30 text-emerald-950 text-xs font-medium rounded-xl hover:bg-emerald-600/30 transition-all disabled:opacity-50"
                      >
                        {loading ? "Sauvegarde..." : "Enregistrer et Publier"}
                      </button>
                    </div>
                  </form>
                ) : (
                  <div className="w-full flex justify-between items-center">
                    <h4 className="text-sm font-medium text-slate-900">Liste des produits ({products.length})</h4>
                    <button 
                      onClick={startNewProduct}
                      className="px-4 py-2 bg-emerald-700/10 hover:bg-emerald-700/20 border border-emerald-700/10 text-emerald-900 text-xs font-medium rounded-full transition-all"
                    >
                      Ajouter un produit
                    </button>
                  </div>
                )}

                {/* Tableau */}
                <div className="bg-white/30 backdrop-blur-md border border-white/50 rounded-3xl overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs border-collapse">
                      <thead>
                        <tr className="border-b border-white/40 bg-white/20 text-slate-600 font-medium">
                          <th className="p-4">Produit</th>
                          <th className="p-4">Catégorie</th>
                          <th className="p-4">Prix</th>
                          <th className="p-4 text-right">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-white/20">
                        {products.map((product) => (
                          <tr key={product.id} className="hover:bg-white/10 transition-colors">
                            <td className="p-4 flex items-center space-x-3">
                              <div className="w-8 h-8 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0">
                                {product.image ? (
                                  <img src={product.image} className="w-full h-full object-cover" />
                                ) : (
                                  <div className="w-full h-full flex items-center justify-center text-[10px]">Img</div>
                                )}
                              </div>
                              <span className="font-medium text-slate-900">{product.name}</span>
                            </td>
                            <td className="p-4 text-slate-600">{product.category}</td>
                            <td className="p-4 text-slate-900 font-medium">{parseFloat(product.price).toFixed(2)} EUR</td>
                            <td className="p-4 text-right space-x-2">
                              <button 
                                onClick={() => setEditingProduct(product)}
                                className="px-2.5 py-1 bg-white/50 hover:bg-white/80 border border-white/60 text-slate-700 text-[11px] font-medium rounded-lg transition-all"
                              >
                                Modifier
                              </button>
                              <button 
                                onClick={() => handleDeleteProduct(product.id)}
                                className="px-2.5 py-1 bg-rose-50/50 hover:bg-rose-50/80 border border-rose-200/40 text-rose-700 text-[11px] font-medium rounded-lg transition-all"
                              >
                                Supprimer
                              </button>
                            </td>
                          </tr>
                        ))}
                        {products.length === 0 && (
                          <tr>
                            <td colSpan="4" className="p-8 text-center text-slate-400 font-light">Aucun produit dans le catalogue.</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="w-full py-4 text-center text-[10px] text-slate-400 border-t border-white/20 bg-white/10 backdrop-blur-sm">
            Aziz Shop — Gestion fluide et légère via Fine-Grained Tokens.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW enregistré', reg))
          .catch(err => console.error('Erreur SW :', err));
      });
    }
  </script>
</body>
</html>
